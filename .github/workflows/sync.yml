name: Sincronizacion Aula Virtual UNAP

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Cambiar al código del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instala las librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests msal browser_cookie3

    - name: Ejecutar Sincronización Completa
      env:
        MICROSOFT_REFRESH_TOKEN: ${{ secrets.MICROSOFT_REFRESH_TOKEN }}
        AULA_VIRTUAL_COOKIE: ${{ secrets.AULA_VIRTUAL_COOKIE }}
      run: python main.py
name: Sincronizacion Aula Virtual UNAP

on:
  schedule:
    # Se ejecuta cada 2 horas automáticamente (Hora UTC)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Activa el botón para correrlo manualmente desde la web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Cambiar al código del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # <-- Corregido aquí (estaba python-python)

    - name: Instala las librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests msal browser_cookie3

    - name: Ejecutar Sincronización Completa
      env:
        # Cargamos todos los secretos desde GitHub de forma segura
        AULA_VIRTUAL_COOKIE: ${{ secrets.AULA_VIRTUAL_COOKIE }}
        MICROSOFT_REFRESH_TOKEN: ${{ secrets.MICROSOFT_REFRESH_TOKEN }}
        # Si decides ocultar el Client ID, descomenta la línea de abajo:
        # CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
      run: python main.py # <-- Asegúrate de que tu archivo se llame exactamente main.py